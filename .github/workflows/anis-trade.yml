name: AnisTrade

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'bot.py'
      - 'subscribers.json'
      - '.github/workflows/anis-trade.yml'
  schedule:
    # Poll Telegram toutes les 5 min (min GitHub Actions)
    - cron: '*/5 * * * *'
    # Scan marché + alertes Highlights (lun–ven 14h UTC)
    - cron: '0 14 * * 1-5'

permissions:
  contents: write

jobs:
  poll-telegram:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *')
      || (github.event_name == 'push')
    runs-on: ubuntu-latest
    concurrency:
      group: telegram-poll
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance pandas lxml html5lib

      - name: Poll Telegram updates
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python -u bot.py --poll-once

      - name: Persist subscribers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscribers.json
          git diff --staged --quiet || git commit -m "Update Telegram subscribers"
          git push

  run-bot:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 14 * * 1-5')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance pandas lxml html5lib

      - name: Run AnisTrade Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python -u bot.py

      - name: Persist subscribers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscribers.json
          git diff --staged --quiet || git commit -m "Update Telegram subscribers"
          git push
