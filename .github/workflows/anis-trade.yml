name: AnisTrade

on:
  workflow_dispatch: # Autorise l'exécution manuelle via le bouton
  schedule:
    # Exécution auto à 14:00 UTC (16h00 Paris), du Lundi au Vendredi
    - cron: '0 14 * * 1-5'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance pandas lxml html5lib

      - name: Run AnisTrade Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -u bot.py
