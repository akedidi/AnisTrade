name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm install

      - name: Generate runtime secrets
        id: gen
        run: |
          echo "webhook_secret=$(openssl rand -hex 32)" >> "$GITHUB_OUTPUT"
          echo "setup_secret=$(openssl rand -hex 32)" >> "$GITHUB_OUTPUT"
          echo "worker_api_secret=$(openssl rand -hex 32)" >> "$GITHUB_OUTPUT"

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: f7b69cab994515555ffc4857328bb770
          command: deploy
          workingDirectory: worker

      - name: Configure Worker secrets
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f7b69cab994515555ffc4857328bb770
        run: |
          printf '%s' "${{ secrets.TELEGRAM_TOKEN }}" | npx wrangler secret put TELEGRAM_TOKEN
          printf '%s' "${{ secrets.WORKER_GITHUB_PAT }}" | npx wrangler secret put GITHUB_PAT
          printf '%s' "akedidi/AnisTrade" | npx wrangler secret put GITHUB_REPO
          printf '%s' "${{ steps.gen.outputs.webhook_secret }}" | npx wrangler secret put WEBHOOK_SECRET
          printf '%s' "${{ steps.gen.outputs.setup_secret }}" | npx wrangler secret put SETUP_SECRET
          printf '%s' "${{ steps.gen.outputs.worker_api_secret }}" | npx wrangler secret put WORKER_API_SECRET

      - name: Register Telegram webhook
        env:
          WORKER_URL: https://anistrade-telegram.kedidi-anis.workers.dev
          SETUP_SECRET: ${{ steps.gen.outputs.setup_secret }}
        run: |
          curl -fsS "${WORKER_URL}/setup?secret=${SETUP_SECRET}&import=8086813061,5404451034,-1004457117208"
          echo ""
          curl -fsS "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/getWebhookInfo" | python3 -m json.tool

      - name: Update GitHub secrets for daily broadcast
        env:
          GH_TOKEN: ${{ secrets.WORKER_GITHUB_PAT }}
          WORKER_API_SECRET: ${{ steps.gen.outputs.worker_api_secret }}
        run: |
          WORKER_URL="https://anistrade-telegram.kedidi-anis.workers.dev"
          echo "$WORKER_API_SECRET" | gh secret set WORKER_API_SECRET -R akedidi/AnisTrade
          echo "${WORKER_URL}/api/subscribers" | gh secret set WORKER_SUBSCRIBERS_URL -R akedidi/AnisTrade
