name: Telegram Command Scan

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Commande menu (highlights, actions, etfs, runners, furtifs, extended)"
        required: true
        type: choice
        options:
          - highlights
          - actions
          - etfs
          - runners
          - furtifs
          - extended
      chat_id:
        description: "Chat Telegram du demandeur"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: telegram-scan-${{ github.event.inputs.chat_id }}
  cancel-in-progress: false

jobs:
  run-command:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance pandas lxml html5lib

      - name: Run scan command
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python -u bot.py --command "${{ github.event.inputs.command }}" --chat-id "${{ github.event.inputs.chat_id }}"
