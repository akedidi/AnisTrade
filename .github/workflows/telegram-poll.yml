name: Telegram Poll

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'bot.py'
      - 'subscribers.json'
      - '.github/workflows/telegram-poll.yml'
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

concurrency:
  group: telegram-poll
  cancel-in-progress: false

jobs:
  poll-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance pandas lxml html5lib

      - name: Poll Telegram (fenêtre 4m30)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python -u bot.py --poll-window 270

      - name: Persist subscribers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscribers.json
          git diff --staged --quiet || git commit -m "Update Telegram subscribers"
          git push
