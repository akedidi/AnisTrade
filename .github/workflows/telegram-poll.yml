name: AnisTrade Telegram Poll

on:
  workflow_dispatch:
  schedule:
    # Répond aux /start et commandes menu en quasi temps réel
    - cron: '*/3 * * * *'

permissions:
  contents: write

jobs:
  poll-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Poll Telegram updates
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u bot.py --poll-once

      - name: Persist subscribers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscribers.json
          git diff --staged --quiet || git commit -m "Update Telegram subscribers"
          git push
