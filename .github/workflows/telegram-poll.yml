name: AnisTrade Telegram Poll

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/telegram-poll.yml'
      - 'bot.py'
      - 'subscribers.json'
  schedule:
    # GitHub Actions : intervalle minimum 5 min (*/3 est ignoré silencieusement)
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'

permissions:
  contents: write

jobs:
  poll-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Poll Telegram updates
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u bot.py --poll-once

      - name: Persist subscribers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscribers.json
          git diff --staged --quiet || git commit -m "Update Telegram subscribers"
          git push
